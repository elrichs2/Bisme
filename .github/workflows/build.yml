name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'pluginmaster.json'
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud distrib
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Path latest.zip -DestinationPath ${{ github.workspace }}/dalamud
        shell: pwsh

      - name: Build
        env:
          DALAMUD_HOME: ${{ github.workspace }}/dalamud
        run: dotnet build -c Release

      - name: Stage release
        shell: pwsh
        run: |
          $stage = "${{ github.workspace }}/release-staging"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item bin/Release/Bisme.dll $stage/
          Copy-Item bin/Release/Bisme.json $stage/
          Copy-Item bin/Release/Bisme.deps.json $stage/
          Compress-Archive -Path "$stage/*" -DestinationPath "${{ github.workspace }}/latest.zip" -Force

      - name: Update pluginmaster.json
        shell: pwsh
        run: |
          $pm = Get-Content pluginmaster.json -Raw | ConvertFrom-Json
          $epoch = [int][double]::Parse((Get-Date -UFormat %s))
          $pm[0].LastUpdate = "$epoch"
          $pm | ConvertTo-Json -Depth 5 | Set-Content pluginmaster.json -Encoding UTF8

      - name: Commit pluginmaster.json
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git diff --staged --quiet || git commit -m "Update pluginmaster.json [skip ci]"
          git push
        shell: bash

      - name: Delete previous "latest" release & tag (if any)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        run: |
          gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
          target_commitish: ${{ github.sha }}
          files: |
            latest.zip
            pluginmaster.json
          prerelease: false
          make_latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
