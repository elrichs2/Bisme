name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Read version from csproj
        id: ver
        shell: pwsh
        run: |
          [xml]$proj = Get-Content Bisme.csproj
          $version = $proj.Project.PropertyGroup.Version
          if (-not $version) { throw "No <Version> found in Bisme.csproj" }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Building version: $version"

      - name: ASCII guard on manifests
        shell: pwsh
        run: |
          # Defense in depth: refuse to build if any non-ASCII byte sneaks into
          # the JSON manifests. Non-ASCII chars are the source of the historical
          # em-dash mojibake (UTF-8 bytes re-interpreted as CP1252 by PS 5.1
          # Get-Content, then re-saved as UTF-8 -> double-encoded garbage).
          $utf8 = New-Object System.Text.UTF8Encoding $false
          foreach ($p in @('Bisme.json','pluginmaster.json','Bisme.csproj')) {
            $c = [System.IO.File]::ReadAllText($p, $utf8)
            $bad = [regex]::Matches($c, '[^\x00-\x7F]')
            if ($bad.Count -gt 0) {
              $i = $bad[0].Index
              $start = [Math]::Max(0, $i - 30)
              $len = [Math]::Min($c.Length - $start, 80)
              throw "ASCII guard failed: $($bad.Count) non-ASCII char(s) in $p (first @ $i). Context: ...$($c.Substring($start, $len))..."
            }
            Write-Host "OK: $p is pure ASCII"
          }

      - name: Sync version into Bisme.json and pluginmaster.json (in-place, NOT committed)
        shell: pwsh
        run: |
          # Use regex replace + .NET File APIs (UTF-8 BOM-less) to avoid:
          # - ConvertFrom-Json/ConvertTo-Json reformat and array-unwrap
          # - Get-Content -Raw default-encoding ambiguity across PS versions
          $utf8 = New-Object System.Text.UTF8Encoding $false
          $epoch = [int][double]::Parse((Get-Date -UFormat %s))

          # Bisme.json
          $bj = [System.IO.File]::ReadAllText('Bisme.json', $utf8)
          $bj = [regex]::Replace($bj, '"AssemblyVersion":\s*"[\d\.]+"', '"AssemblyVersion": "' + $env:VERSION + '"')
          [System.IO.File]::WriteAllText('Bisme.json', $bj, $utf8)

          # pluginmaster.json (regex replace preserves array wrapper and formatting)
          $pm = [System.IO.File]::ReadAllText('pluginmaster.json', $utf8)
          $pm = [regex]::Replace($pm, '"AssemblyVersion":\s*"[\d\.]+"', '"AssemblyVersion": "' + $env:VERSION + '"')
          $pm = [regex]::Replace($pm, '"LastUpdate":\s*"\d+"', '"LastUpdate": "' + $epoch + '"')
          [System.IO.File]::WriteAllText('pluginmaster.json', $pm, $utf8)

          # Re-validate after rewrite
          foreach ($p in @('Bisme.json','pluginmaster.json')) {
            $c = [System.IO.File]::ReadAllText($p, $utf8)
            $bad = [regex]::Matches($c, '[^\x00-\x7F]')
            if ($bad.Count -gt 0) { throw "ASCII guard post-write failed in $p" }
            $null = $c | ConvertFrom-Json
          }

      - name: Download Dalamud distrib
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath ${{ github.workspace }}/dalamud
        shell: pwsh

      - name: Build
        env:
          DALAMUD_HOME: ${{ github.workspace }}/dalamud
        run: dotnet build -c Release

      - name: Stage release
        shell: pwsh
        run: |
          $stage = "${{ github.workspace }}/release-staging"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item bin/Release/Bisme.dll $stage/
          Copy-Item bin/Release/Bisme.json $stage/
          Copy-Item bin/Release/Bisme.deps.json $stage/
          Compress-Archive -Path "$stage/*" -DestinationPath "${{ github.workspace }}/latest.zip" -Force

      - name: Delete previous "latest" release & tag (if any)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        run: |
          gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Latest build (v{0})', env.VERSION) }}
          target_commitish: ${{ github.sha }}
          files: |
            latest.zip
            pluginmaster.json
          prerelease: false
          make_latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
