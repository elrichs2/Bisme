name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Read version from csproj
        id: ver
        shell: pwsh
        run: |
          [xml]$proj = Get-Content Bisme.csproj
          $version = $proj.Project.PropertyGroup.Version
          if (-not $version) { throw "No <Version> found in Bisme.csproj" }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Building version: $version"

      - name: Sync version into Bisme.json and pluginmaster.json (in-place, NOT committed)
        shell: pwsh
        run: |
          $epoch = [int][double]::Parse((Get-Date -UFormat %s))

          # Bisme.json
          $bj = Get-Content Bisme.json -Raw | ConvertFrom-Json
          $bj.AssemblyVersion = $env:VERSION
          $bj | ConvertTo-Json -Depth 5 | Set-Content Bisme.json -Encoding utf8NoBOM

          # pluginmaster.json — must remain an array even with a single element
          $pm = Get-Content pluginmaster.json -Raw | ConvertFrom-Json
          if ($pm -is [System.Array]) {
            $pm[0].AssemblyVersion = $env:VERSION
            $pm[0].LastUpdate = "$epoch"
          } else {
            $pm.AssemblyVersion = $env:VERSION
            $pm.LastUpdate = "$epoch"
            $pm = @($pm)
          }
          $pm | ConvertTo-Json -Depth 5 -AsArray | Set-Content pluginmaster.json -Encoding utf8NoBOM

      - name: Download Dalamud distrib
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath ${{ github.workspace }}/dalamud
        shell: pwsh

      - name: Build
        env:
          DALAMUD_HOME: ${{ github.workspace }}/dalamud
        run: dotnet build -c Release

      - name: Stage release
        shell: pwsh
        run: |
          $stage = "${{ github.workspace }}/release-staging"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item bin/Release/Bisme.dll $stage/
          Copy-Item bin/Release/Bisme.json $stage/
          Copy-Item bin/Release/Bisme.deps.json $stage/
          Compress-Archive -Path "$stage/*" -DestinationPath "${{ github.workspace }}/latest.zip" -Force

      - name: Delete previous "latest" release & tag (if any)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        run: |
          gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Latest build (v{0})', env.VERSION) }}
          target_commitish: ${{ github.sha }}
          files: |
            latest.zip
            pluginmaster.json
          prerelease: false
          make_latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
